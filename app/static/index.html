<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Collector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8' },
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .source-bar { border-left: 3px solid var(--source-color, #d1d5db); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="collector()" x-init="init()" x-cloak>

  <!-- Header -->
  <header class="sticky top-0 z-20 bg-gradient-to-r from-brand-600 to-brand-700 text-white shadow-md">
    <div class="max-w-2xl mx-auto px-4 pt-4 pb-3">
      <div class="flex items-center justify-between mb-3">
        <h1 class="text-lg font-bold tracking-tight">Collector</h1>
        <span class="text-xs text-blue-200" x-show="total > 0" x-text="`${total} 条`"></span>
      </div>

      <!-- Collect input -->
      <form @submit.prevent="collect()" class="relative mb-2">
        <div class="flex gap-2">
          <div class="flex-1 min-w-0 relative">
            <input
              type="text"
              x-model="collectInput"
              placeholder="粘贴链接或文本，快速收集…"
              class="w-full rounded-lg bg-white/15 backdrop-blur border border-white/20 px-3 py-2 text-sm text-white placeholder-blue-200 focus:outline-none focus:bg-white/25 focus:border-white/40"
            >
          </div>
          <button
            type="submit"
            :disabled="!collectInput.trim() || collecting"
            class="shrink-0 bg-white text-brand-700 px-4 py-2 rounded-lg text-sm font-semibold disabled:opacity-40 active:bg-blue-50 transition"
          >
            <span x-show="!collecting">收集</span>
            <span x-show="collecting">…</span>
          </button>
        </div>
        <!-- Tags input for collection -->
        <div x-show="collectInput.trim()" x-transition class="mt-2 flex items-center gap-2">
          <span class="text-xs text-blue-200 shrink-0">标签:</span>
          <div class="flex flex-wrap gap-1 items-center flex-1 min-w-0">
            <template x-for="(tag, i) in collectTags" :key="i">
              <span class="inline-flex items-center gap-0.5 bg-white/20 text-white text-xs px-2 py-0.5 rounded-full">
                <span x-text="tag"></span>
                <button type="button" @click="collectTags.splice(i, 1)" class="hover:text-red-200">&times;</button>
              </span>
            </template>
            <div class="relative">
              <input
                type="text"
                x-model="collectTagInput"
                @keydown.enter.prevent="addCollectTag()"
                @keydown.comma.prevent="addCollectTag()"
                @input="filterSuggestions(collectTagInput, 'collectSuggestions')"
                @focus="filterSuggestions(collectTagInput, 'collectSuggestions')"
                @blur="setTimeout(() => collectSuggestions = [], 150)"
                placeholder="+ 添加标签"
                class="bg-transparent text-xs text-white placeholder-blue-200/60 focus:outline-none w-20"
              >
              <div
                x-show="collectSuggestions.length > 0"
                class="absolute top-full left-0 mt-1 bg-white text-gray-700 rounded-lg shadow-lg py-1 z-30 min-w-[120px]"
              >
                <template x-for="s in collectSuggestions" :key="s">
                  <button
                    type="button"
                    @mousedown.prevent="collectTagInput = s; addCollectTag()"
                    class="block w-full text-left px-3 py-1.5 text-xs hover:bg-blue-50"
                    x-text="s"
                  ></button>
                </template>
              </div>
            </div>
          </div>
        </div>
      </form>

      <!-- Search -->
      <form @submit.prevent="search()" class="flex gap-2">
        <div class="relative flex-1 min-w-0">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-blue-200/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input
            type="text"
            x-model="searchQuery"
            @keyup.escape="clearSearch()"
            placeholder="搜索…"
            class="w-full rounded-lg bg-white/15 backdrop-blur border border-white/20 pl-8 pr-3 py-1.5 text-sm text-white placeholder-blue-200/60 focus:outline-none focus:bg-white/25 focus:border-white/40"
          >
        </div>
        <button
          x-show="activeSearch"
          @click="clearSearch()"
          type="button"
          class="shrink-0 text-blue-200 text-xs px-2 py-1 hover:text-white"
        >清除</button>
      </form>
    </div>

    <!-- Source filter bar -->
    <div class="bg-brand-700/50 border-t border-white/10">
      <div class="max-w-2xl mx-auto px-4 py-2 flex gap-2 overflow-x-auto hide-scrollbar">
        <template x-for="s in sourceFilters" :key="s.value">
          <button
            @click="toggleSource(s.value)"
            class="shrink-0 text-xs px-3 py-1 rounded-full transition font-medium"
            :class="activeSource === s.value
              ? 'bg-white text-brand-700 shadow-sm'
              : 'text-blue-100 hover:bg-white/10'"
            x-text="s.label"
          ></button>
        </template>
      </div>
    </div>

    <!-- Tag filter bar -->
    <div x-show="allTags.length > 0" class="bg-white border-b border-gray-100">
      <div class="max-w-2xl mx-auto px-4 py-2 flex gap-1.5 overflow-x-auto hide-scrollbar items-center">
        <svg class="shrink-0 w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5a2 2 0 012 2v5l-7 7L3 13l7-7z"/></svg>
        <template x-for="t in allTags" :key="t">
          <button
            @click="toggleTag(t)"
            class="shrink-0 text-xs px-2.5 py-0.5 rounded-full border transition"
            :class="activeTag === t
              ? 'bg-brand-600 text-white border-brand-600'
              : 'bg-gray-50 text-gray-600 border-gray-200 hover:border-brand-300 hover:text-brand-600'"
            x-text="t"
          ></button>
        </template>
      </div>
    </div>
  </header>

  <!-- Toast -->
  <div
    x-show="toast"
    x-transition.opacity.duration.200ms
    class="fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gray-800/90 backdrop-blur text-white text-sm px-5 py-2.5 rounded-xl shadow-xl"
    x-text="toast"
  ></div>

  <!-- Content -->
  <main class="px-4 py-4 max-w-2xl mx-auto pb-20">

    <!-- Loading -->
    <div x-show="loading" class="text-center py-16">
      <div class="inline-block w-6 h-6 border-2 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && resources.length === 0" class="text-center py-16">
      <div class="text-4xl mb-3 opacity-30">
        <svg class="w-16 h-16 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
      </div>
      <p class="text-gray-400 text-sm" x-text="activeSearch || activeSource || activeTag ? '没有找到匹配的内容' : '还没有收集任何内容'"></p>
      <p x-show="!activeSearch && !activeSource && !activeTag" class="text-gray-300 text-xs mt-1">粘贴链接到上方开始收集</p>
    </div>

    <!-- Resource list -->
    <div class="space-y-3">
      <template x-for="item in resources" :key="item.id">
        <div
          class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden transition hover:shadow-md source-bar"
          :style="`--source-color: ${sourceColor(item.source)}`"
        >
          <div class="p-4">
            <div class="flex items-start justify-between gap-2">
              <div class="flex-1 min-w-0">
                <!-- Title -->
                <a
                  :href="item.url"
                  target="_blank"
                  rel="noopener"
                  class="text-sm font-medium text-gray-900 hover:text-brand-600 line-clamp-2 block leading-snug transition"
                  x-text="item.title || '(无标题)'"
                ></a>
                <!-- Meta row -->
                <div class="flex items-center gap-2 mt-2">
                  <span
                    class="inline-block text-[11px] px-1.5 py-0.5 rounded font-medium"
                    :class="sourceStyle(item.source)"
                    x-text="sourceLabel(item.source)"
                  ></span>
                  <span class="text-[11px] text-gray-400" x-text="formatTime(item.created_at)"></span>
                </div>
                <!-- Summary -->
                <p
                  x-show="item.summary && item.summary !== item.title"
                  class="text-xs text-gray-500 mt-2 line-clamp-2 leading-relaxed"
                  x-text="item.summary"
                ></p>
              </div>
              <!-- Delete -->
              <button
                @click="deleteResource(item.id)"
                class="shrink-0 text-gray-300 hover:text-red-400 active:text-red-500 p-1 transition"
                title="删除"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
            <!-- Tags row -->
            <div class="flex flex-wrap items-center gap-1.5 mt-2.5">
              <template x-for="(tag, i) in item.tags" :key="tag">
                <span class="inline-flex items-center gap-0.5 bg-slate-100 text-slate-600 text-[11px] px-2 py-0.5 rounded-full group">
                  <span
                    class="cursor-pointer hover:text-brand-600"
                    @click="toggleTag(tag)"
                    x-text="tag"
                  ></span>
                  <button
                    @click="removeTag(item.id, item.tags, i)"
                    class="text-slate-400 hover:text-red-400 hidden group-hover:inline transition"
                  >&times;</button>
                </span>
              </template>
              <!-- Add tag button/input -->
              <div x-data="{ editing: false, input: '' }" class="relative">
                <button
                  x-show="!editing"
                  @click="editing = true; $nextTick(() => $refs.tagInput.focus())"
                  class="text-[11px] text-gray-400 hover:text-brand-600 px-1.5 py-0.5 rounded-full border border-dashed border-gray-200 hover:border-brand-300 transition"
                >+ 标签</button>
                <div x-show="editing" class="inline-flex items-center">
                  <input
                    x-ref="tagInput"
                    x-model="input"
                    @keydown.enter.prevent="if(input.trim()){addTagToResource(item.id, item.tags, input.trim()); input='';} editing=false"
                    @keydown.comma.prevent="if(input.trim()){addTagToResource(item.id, item.tags, input.trim()); input='';}"
                    @keydown.escape="editing=false; input=''"
                    @blur="if(input.trim()){addTagToResource(item.id, item.tags, input.trim()); input='';} editing=false"
                    @input="filterSuggestions(input, 'inlineSuggestions')"
                    @focus="filterSuggestions(input, 'inlineSuggestions')"
                    class="text-[11px] border border-brand-300 rounded-full px-2 py-0.5 w-20 focus:outline-none focus:ring-1 focus:ring-brand-400"
                    placeholder="标签名"
                  >
                </div>
                <!-- Inline suggestions -->
                <div
                  x-show="editing && $data.input && inlineSuggestions.length > 0"
                  class="absolute top-full left-0 mt-1 bg-white rounded-lg shadow-lg py-1 z-30 min-w-[100px] border border-gray-100"
                >
                  <template x-for="s in inlineSuggestions" :key="s">
                    <button
                      @mousedown.prevent="addTagToResource(item.id, item.tags, s); input=''; editing=false"
                      class="block w-full text-left px-3 py-1 text-xs hover:bg-blue-50 text-gray-700"
                      x-text="s"
                    ></button>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Pagination -->
    <div x-show="totalPages > 1" class="flex items-center justify-center gap-6 mt-8 pb-4">
      <button
        @click="goPage(page - 1)"
        :disabled="page <= 1"
        class="text-sm font-medium text-brand-600 disabled:text-gray-300 px-3 py-1.5 rounded-lg hover:bg-brand-50 transition disabled:hover:bg-transparent"
      >
        <span>&larr; 上一页</span>
      </button>
      <span class="text-sm text-gray-400" x-text="`${page} / ${totalPages}`"></span>
      <button
        @click="goPage(page + 1)"
        :disabled="page >= totalPages"
        class="text-sm font-medium text-brand-600 disabled:text-gray-300 px-3 py-1.5 rounded-lg hover:bg-brand-50 transition disabled:hover:bg-transparent"
      >
        <span>下一页 &rarr;</span>
      </button>
    </div>
  </main>

  <script>
    function collector() {
      return {
        resources: [],
        loading: false,
        collecting: false,
        collectInput: '',
        collectTags: [],
        collectTagInput: '',
        collectSuggestions: [],
        inlineSuggestions: [],
        searchQuery: '',
        activeSearch: '',
        activeSource: '',
        activeTag: '',
        allTags: [],
        page: 1,
        size: 20,
        total: 0,
        toast: '',

        sourceFilters: [
          { value: '', label: '全部' },
          { value: 'wechat', label: '微信' },
          { value: 'xiaohongshu', label: '小红书' },
          { value: 'zhihu', label: '知乎' },
          { value: 'bilibili', label: 'B站' },
          { value: 'other', label: '其他' },
        ],

        get totalPages() {
          return Math.max(1, Math.ceil(this.total / this.size));
        },

        async init() {
          await Promise.all([this.loadResources(), this.loadTags()]);
        },

        async loadResources() {
          this.loading = true;
          try {
            const params = new URLSearchParams({ page: this.page, size: this.size });
            if (this.activeSearch) params.set('search', this.activeSearch);
            if (this.activeSource) params.set('source', this.activeSource);
            if (this.activeTag) params.set('tag', this.activeTag);
            const res = await fetch(`/api/resources?${params}`);
            const data = await res.json();
            this.resources = data.items;
            this.total = data.total;
          } catch (e) {
            this.showToast('加载失败');
          } finally {
            this.loading = false;
          }
        },

        async loadTags() {
          try {
            const res = await fetch('/api/tags');
            this.allTags = await res.json();
          } catch (e) { /* ignore */ }
        },

        async collect() {
          const content = this.collectInput.trim();
          if (!content) return;
          this.collecting = true;
          try {
            const res = await fetch('/api/collect', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content, tags: this.collectTags }),
            });
            if (!res.ok) throw new Error();
            this.collectInput = '';
            this.collectTags = [];
            this.collectTagInput = '';
            this.showToast('已收集');
            this.page = 1;
            this.activeSearch = '';
            this.activeSource = '';
            this.activeTag = '';
            this.searchQuery = '';
            await Promise.all([this.loadResources(), this.loadTags()]);
          } catch (e) {
            this.showToast('收集失败');
          } finally {
            this.collecting = false;
          }
        },

        addCollectTag() {
          const tag = this.collectTagInput.trim().replace(/,/g, '');
          if (tag && !this.collectTags.includes(tag)) {
            this.collectTags.push(tag);
          }
          this.collectTagInput = '';
          this.collectSuggestions = [];
        },

        search() {
          this.activeSearch = this.searchQuery.trim();
          this.page = 1;
          this.loadResources();
        },

        clearSearch() {
          this.searchQuery = '';
          this.activeSearch = '';
          this.page = 1;
          this.loadResources();
        },

        toggleSource(val) {
          this.activeSource = this.activeSource === val ? '' : val;
          this.page = 1;
          this.loadResources();
        },

        toggleTag(tag) {
          this.activeTag = this.activeTag === tag ? '' : tag;
          this.page = 1;
          this.loadResources();
        },

        async addTagToResource(id, currentTags, newTag) {
          if (currentTags.includes(newTag)) return;
          const tags = [...currentTags, newTag];
          try {
            const res = await fetch(`/api/resources/${id}/tags`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ tags }),
            });
            if (!res.ok) throw new Error();
            const updated = await res.json();
            const idx = this.resources.findIndex(r => r.id === id);
            if (idx >= 0) this.resources[idx].tags = updated.tags;
            await this.loadTags();
          } catch (e) {
            this.showToast('添加标签失败');
          }
        },

        async removeTag(id, currentTags, tagIndex) {
          const tags = currentTags.filter((_, i) => i !== tagIndex);
          try {
            const res = await fetch(`/api/resources/${id}/tags`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ tags }),
            });
            if (!res.ok) throw new Error();
            const updated = await res.json();
            const idx = this.resources.findIndex(r => r.id === id);
            if (idx >= 0) this.resources[idx].tags = updated.tags;
            await this.loadTags();
          } catch (e) {
            this.showToast('删除标签失败');
          }
        },

        async deleteResource(id) {
          try {
            const res = await fetch(`/api/resources/${id}`, { method: 'DELETE' });
            if (!res.ok) throw new Error();
            this.showToast('已删除');
            await Promise.all([this.loadResources(), this.loadTags()]);
          } catch (e) {
            this.showToast('删除失败');
          }
        },

        filterSuggestions(input, target) {
          const q = (input || '').trim().toLowerCase();
          this[target] = q
            ? this.allTags.filter(t => t.toLowerCase().includes(q) && !this.collectTags.includes(t))
            : this.allTags.filter(t => !this.collectTags.includes(t)).slice(0, 8);
        },

        goPage(p) {
          if (p < 1 || p > this.totalPages) return;
          this.page = p;
          this.loadResources();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        sourceLabel(source) {
          const map = { wechat: '微信', xiaohongshu: '小红书', zhihu: '知乎', bilibili: 'B站', other: '其他' };
          return map[source] || source;
        },

        sourceStyle(source) {
          const map = {
            wechat: 'bg-green-100 text-green-700',
            xiaohongshu: 'bg-red-100 text-red-700',
            zhihu: 'bg-blue-100 text-blue-700',
            bilibili: 'bg-pink-100 text-pink-700',
            other: 'bg-gray-100 text-gray-600',
          };
          return map[source] || map.other;
        },

        sourceColor(source) {
          const map = {
            wechat: '#16a34a',
            xiaohongshu: '#ef4444',
            zhihu: '#3b82f6',
            bilibili: '#ec4899',
            other: '#9ca3af',
          };
          return map[source] || map.other;
        },

        formatTime(iso) {
          const d = new Date(iso);
          const now = new Date();
          const pad = n => String(n).padStart(2, '0');
          const diff = now - d;
          if (diff < 60000) return '刚刚';
          if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
          if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
          if (d.getFullYear() === now.getFullYear()) {
            return `${d.getMonth() + 1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
          }
          return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
        },

        showToast(msg) {
          this.toast = msg;
          setTimeout(() => { this.toast = ''; }, 2000);
        },
      };
    }
  </script>
</body>
</html>
